<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>🚀 创业指南</title><meta name="description" content="创业入门·地摊经济·副业赚钱"><style>*{margin:0;padding:0;box-sizing:border-box}:root{--accent:#d97706}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:#fafafa;color:#1a1a2e;line-height:1.7}.container{max-width:800px;margin:0 auto;padding:0 20px}header{background:linear-gradient(135deg,var(--accent),var(--accent));color:#fff;padding:40px 0;text-align:center;margin-bottom:32px}header h1{font-size:1.8rem}header p{opacity:.9;margin-top:8px}.post{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:24px;margin-bottom:20px}.post h2{font-size:1.1rem}.post h2 a{color:#1a1a2e;text-decoration:none}.post h2 a:hover{color:var(--accent)}.post .date{color:#666;font-size:.8rem;margin-bottom:12px}.post .intro{color:#555;font-size:.88rem;line-height:1.8}.tag{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:10px;margin-left:6px;background:#fafafa;color:var(--accent)}footer{text-align:center;padding:32px 20px;color:#666;font-size:.78rem;border-top:1px solid #e5e7eb;margin-top:40px}@media(max-width:600px){header{padding:28px 0}header h1{font-size:1.4rem}}</style></head><body><header><h1>🚀 创业指南</h1><p>创业入门·地摊经济·副业赚钱 · 每日更新</p></header><main class="container"><div id="posts"><p style="text-align:center;color:#666;padding:40px">加载中...</p></div></main><footer><p>🚀 创业指南 · 每日自动更新</p></footer><script>fetch("feed.json").then(function(r){return r.json()}).then(function(d){var p=document.getElementById("posts");p.innerHTML="";(d.posts||[]).slice(0,7).forEach(function(post){var h="<article class=post><h2><a href=posts/"+post.slug+".html>"+esc(post.title)+"</a></h2><div class=date>"+post.date;if(post.tag)h+=" · <span class=tag>"+esc(post.tag)+"</span>";h+="</div>";h+="<p class=intro>"+esc(post.intro||"")+"</p>";h+="</article>";p.innerHTML+=h})}).catch(function(){p.innerHTML="<p style=text-align:center;color:#666;padding:40px>请稍后刷新</p>"});function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</script></body></html>
